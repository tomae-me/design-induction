<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Figma Design Induction</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --purple-50: #EEEDFE;
    --purple-100: #CECBF6;
    --purple-200: #AFA9EC;
    --purple-400: #7F77DD;
    --purple-600: #534AB7;
    --purple-800: #3C3489;
    --purple-900: #26215C;
    --teal-50: #E1F5EE;
    --teal-100: #9FE1CB;
    --teal-400: #1D9E75;
    --teal-600: #0F6E56;
    --teal-800: #085041;
    --amber-50: #FAEEDA;
    --amber-400: #BA7517;
    --amber-800: #633806;
    --coral-50: #FAECE7;
    --coral-400: #D85A30;
    --coral-800: #712B13;
    --bg: #0E0E12;
    --bg-card: #16161C;
    --bg-sidebar: #111117;
    --bg-hover: #1E1E28;
    --border: rgba(255,255,255,0.07);
    --border-accent: rgba(127,119,221,0.4);
    --text-primary: #F0EFF8;
    --text-secondary: #8B89A8;
    --text-muted: #5A5876;
    --accent: #7F77DD;
    --accent-light: #AFA9EC;
    --success: #1D9E75;
    --font: 'DM Sans', sans-serif;
    --mono: 'DM Mono', monospace;
    --radius: 10px;
    --radius-lg: 14px;
  }

  html, body { height: 100%; background: var(--bg); color: var(--text-primary); font-family: var(--font); font-size: 15px; line-height: 1.6; overflow: hidden; }

  /* === LOGIN SCREEN === */
  .login-screen { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 1000; }
  .login-screen.hidden { display: none; }
  .login-card { width: 380px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 20px; padding: 40px; }
  .login-logo { display: flex; align-items: center; gap: 10px; margin-bottom: 32px; }
  .login-logo-mark { width: 36px; height: 36px; background: var(--purple-400); border-radius: 9px; display: flex; align-items: center; justify-content: center; }
  .login-logo-mark svg { width: 20px; height: 20px; fill: white; }
  .login-logo-text { font-size: 15px; font-weight: 600; color: var(--text-primary); letter-spacing: -0.02em; }
  .login-logo-sub { font-size: 11px; color: var(--text-muted); margin-top: 1px; }
  .login-title { font-size: 22px; font-weight: 600; letter-spacing: -0.03em; color: var(--text-primary); margin-bottom: 6px; }
  .login-sub { font-size: 13px; color: var(--text-secondary); margin-bottom: 28px; }
  .login-field { margin-bottom: 16px; }
  .login-label { font-size: 11px; font-weight: 500; color: var(--text-secondary); letter-spacing: 0.04em; text-transform: uppercase; margin-bottom: 6px; }
  .login-input { width: 100%; padding: 11px 14px; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text-primary); font-family: var(--font); font-size: 14px; outline: none; transition: border-color 0.15s; }
  .login-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(127,119,221,0.12); }
  .login-input::placeholder { color: var(--text-muted); }
  .login-btn { width: 100%; padding: 12px; background: var(--purple-400); color: white; border: none; border-radius: var(--radius); font-family: var(--font); font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.2s; margin-top: 8px; }
  .login-btn:hover { background: var(--purple-600); transform: translateY(-1px); }
  .login-btn:active { transform: translateY(0); }
  .login-error { font-size: 12px; color: #E24B4A; margin-top: 10px; min-height: 18px; text-align: center; }

  /* === USER BADGE IN TOPBAR === */
  .user-badge { display: flex; align-items: center; gap: 8px; }
  .user-avatar { width: 28px; height: 28px; border-radius: 50%; background: rgba(127,119,221,0.2); border: 1px solid rgba(127,119,221,0.3); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; color: var(--accent-light); }
  .user-name { font-size: 12px; color: var(--text-secondary); }
  .logout-btn { padding: 5px 10px; border: 1px solid var(--border); background: none; color: var(--text-muted); font-family: var(--font); font-size: 11px; border-radius: 6px; cursor: pointer; transition: all 0.15s; }
  .logout-btn:hover { border-color: rgba(255,100,100,0.3); color: #FF6B6B; background: rgba(255,100,100,0.05); }

  /* === LAYOUT === */
  .app { display: flex; height: 100vh; }
  .sidebar { width: 260px; flex-shrink: 0; background: var(--bg-sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

  /* === SIDEBAR HEADER === */
  .sidebar-top { padding: 24px 20px 16px; border-bottom: 1px solid var(--border); }
  .logo { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
  .logo-mark { width: 32px; height: 32px; background: var(--purple-400); border-radius: 8px; display: flex; align-items: center; justify-content: center; }
  .logo-mark svg { width: 18px; height: 18px; fill: white; }
  .logo-text { font-size: 14px; font-weight: 600; color: var(--text-primary); letter-spacing: -0.02em; }
  .logo-sub { font-size: 11px; color: var(--text-muted); margin-top: 1px; }
  .overall-progress { }
  .op-label { display: flex; justify-content: space-between; font-size: 12px; color: var(--text-secondary); margin-bottom: 6px; }
  .op-pct { color: var(--accent-light); font-weight: 500; }
  .progress-track { height: 4px; background: rgba(255,255,255,0.06); border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--purple-400), var(--teal-400)); border-radius: 2px; transition: width 0.5s cubic-bezier(0.4,0,0.2,1); }

  /* === CHAPTER LIST === */
  .chapter-list { flex: 1; overflow-y: auto; padding: 8px 0; }
  .chapter-list::-webkit-scrollbar { width: 4px; }
  .chapter-list::-webkit-scrollbar-track { background: transparent; }
  .chapter-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
  .ch-btn { display: flex; align-items: center; gap: 12px; width: 100%; padding: 10px 20px; border: none; background: none; cursor: pointer; text-align: left; color: var(--text-secondary); font-family: var(--font); font-size: 13px; transition: all 0.15s; border-left: 2px solid transparent; }
  .ch-btn:hover { background: var(--bg-hover); color: var(--text-primary); }
  .ch-btn.active { background: rgba(127,119,221,0.1); color: var(--text-primary); border-left-color: var(--accent); }
  .ch-btn.done { color: var(--text-secondary); }
  .ch-num { width: 22px; height: 22px; border-radius: 50%; border: 1.5px solid rgba(255,255,255,0.12); display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 500; flex-shrink: 0; font-family: var(--mono); transition: all 0.2s; color: var(--text-muted); }
  .ch-btn.active .ch-num { background: var(--purple-400); border-color: var(--purple-400); color: white; }
  .ch-btn.done .ch-num { background: rgba(29,158,117,0.2); border-color: var(--success); color: var(--success); font-size: 12px; }
  .ch-name { flex: 1; line-height: 1.3; }
  .ch-time { font-size: 10px; color: var(--text-muted); flex-shrink: 0; }

  /* === SIDEBAR FOOTER === */
  .sidebar-footer { padding: 14px 20px; border-top: 1px solid var(--border); }
  .reset-btn { width: 100%; padding: 8px; border: 1px solid rgba(255,255,255,0.08); background: none; color: var(--text-muted); font-family: var(--font); font-size: 12px; border-radius: var(--radius); cursor: pointer; transition: all 0.15s; }
  .reset-btn:hover { border-color: rgba(255,100,100,0.3); color: #FF6B6B; background: rgba(255,100,100,0.05); }

  /* === TOP BAR === */
  .topbar { padding: 16px 32px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  .topbar-chapter { font-size: 11px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--accent); }
  .topbar-title { font-size: 18px; font-weight: 600; letter-spacing: -0.02em; color: var(--text-primary); margin-top: 2px; }
  .topbar-meta { display: flex; gap: 8px; align-items: center; }
  .badge { display: inline-flex; align-items: center; gap: 5px; padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 500; }
  .badge-time { background: rgba(255,255,255,0.05); color: var(--text-secondary); border: 1px solid var(--border); }
  .badge-level-beginner { background: rgba(29,158,117,0.15); color: #5DCAA5; border: 1px solid rgba(29,158,117,0.3); }
  .badge-level-intermediate { background: rgba(127,119,221,0.15); color: var(--accent-light); border: 1px solid rgba(127,119,221,0.3); }
  .badge-level-advanced { background: rgba(216,90,48,0.15); color: #F0997B; border: 1px solid rgba(216,90,48,0.3); }

  /* === CONTENT AREA === */
  .content { flex: 1; overflow-y: auto; padding: 32px; }
  .content::-webkit-scrollbar { width: 6px; }
  .content::-webkit-scrollbar-track { background: transparent; }
  .content::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 3px; }

  .chapter-view { display: none; animation: fadeIn 0.25s ease; }
  .chapter-view.active { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

  /* === CONTENT SECTIONS === */
  .section { margin-bottom: 28px; }
  .section-label { font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 12px; }

  .concept-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 16px 18px; margin-bottom: 8px; transition: border-color 0.15s; }
  .concept-card:hover { border-color: rgba(255,255,255,0.12); }
  .concept-title { font-size: 14px; font-weight: 600; color: var(--text-primary); margin-bottom: 5px; }
  .concept-desc { font-size: 13px; color: var(--text-secondary); line-height: 1.6; }

  .task-card { background: rgba(127,119,221,0.07); border: 1px solid rgba(127,119,221,0.25); border-radius: var(--radius-lg); padding: 20px 22px; margin-bottom: 8px; }
  .task-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .task-icon { font-size: 18px; }
  .task-label-text { font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--purple-200); }
  .task-title { font-size: 15px; font-weight: 600; color: var(--purple-50); margin-bottom: 12px; }
  .task-steps { list-style: none; display: flex; flex-direction: column; gap: 7px; }
  .task-step { display: flex; gap: 10px; align-items: flex-start; }
  .step-check { width: 20px; height: 20px; border-radius: 50%; border: 1.5px solid rgba(127,119,221,0.4); display: flex; align-items: center; justify-content: center; flex-shrink: 0; cursor: pointer; transition: all 0.15s; margin-top: 2px; }
  .step-check:hover { border-color: var(--accent); background: rgba(127,119,221,0.1); }
  .step-check.checked { background: var(--purple-400); border-color: var(--purple-400); }
  .step-check.checked::after { content: ''; display: block; width: 5px; height: 8px; border: 1.5px solid white; border-top: none; border-left: none; transform: rotate(45deg) translate(-1px, -1px); }
  .step-text { font-size: 13px; color: var(--purple-100); line-height: 1.6; flex: 1; transition: color 0.15s; }
  .step-text.checked { color: var(--text-muted); text-decoration: line-through; }

  .tip-card { background: rgba(29,158,117,0.07); border: 1px solid rgba(29,158,117,0.25); border-radius: var(--radius-lg); padding: 14px 18px; }
  .tip-label { font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--teal-400); margin-bottom: 5px; }
  .tip-text { font-size: 13px; color: var(--teal-100); line-height: 1.6; }

  /* === FIGMA PAGE BANNER === */
  .figma-banner { display: flex; align-items: center; gap: 12px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: var(--radius); padding: 11px 16px; margin-bottom: 28px; }
  .figma-banner-icon { width: 28px; height: 28px; background: #1e1e1e; border-radius: 6px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .figma-banner-icon svg { width: 16px; height: 16px; }
  .figma-banner-text { flex: 1; font-size: 13px; color: var(--text-secondary); }
  .figma-banner-text strong { color: var(--text-primary); font-weight: 500; }
  .figma-banner-page { font-family: var(--mono); font-size: 11px; color: var(--accent-light); background: rgba(127,119,221,0.12); border: 1px solid rgba(127,119,221,0.25); padding: 3px 10px; border-radius: 20px; flex-shrink: 0; }
  .sample-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 24px; margin-bottom: 8px; }
  .sample-label { font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
  .sample-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .sample-inner { background: #1A1A24; border-radius: 8px; padding: 24px; display: flex; align-items: center; justify-content: center; min-height: 160px; }

  /* figma-style UI components inside samples */
  .s-color-row { display: flex; gap: 12px; align-items: flex-end; flex-wrap: wrap; }
  .s-swatch { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .s-swatch-dot { border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); }
  .s-swatch-name { font-size: 10px; color: #6B6990; font-family: var(--mono); text-align: center; }
  .s-swatch-hex { font-size: 9px; color: #4A4868; font-family: var(--mono); }

  .s-type-stack { display: flex; flex-direction: column; gap: 8px; width: 100%; }
  .s-h1 { font-size: 28px; font-weight: 700; color: #F0EFF8; letter-spacing: -0.02em; line-height: 1.1; font-family: var(--font); }
  .s-title { font-size: 16px; font-weight: 500; color: #C8C7E0; font-family: var(--font); }
  .s-body { font-size: 12px; color: #8B89A8; line-height: 1.6; font-family: var(--font); }
  .s-divider { height: 1px; background: rgba(255,255,255,0.06); margin: 4px 0; }
  .s-type-meta { font-size: 9px; color: #4A4868; font-family: var(--mono); }

  .s-btn-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .s-btn { padding: 9px 18px; border-radius: 8px; font-family: var(--font); font-size: 13px; font-weight: 500; cursor: default; border: none; }
  .s-btn-primary { background: #7F77DD; color: white; }
  .s-btn-secondary { background: transparent; color: #AFA9EC; border: 1px solid rgba(127,119,221,0.5) !important; }
  .s-btn-disabled { background: rgba(255,255,255,0.05); color: #4A4868; }
  .s-btn-ghost { background: transparent; color: #8B89A8; }

  .s-input-stack { display: flex; flex-direction: column; gap: 10px; width: 100%; max-width: 280px; }
  .s-field { display: flex; flex-direction: column; gap: 4px; }
  .s-label { font-size: 10px; font-weight: 500; color: #8B89A8; font-family: var(--font); }
  .s-input { padding: 8px 12px; border-radius: 7px; font-family: var(--font); font-size: 12px; background: #0E0E12; border: 1px solid; }
  .s-input-default { border-color: rgba(255,255,255,0.12); color: #4A4868; }
  .s-input-focused { border-color: #7F77DD; color: #F0EFF8; box-shadow: 0 0 0 3px rgba(127,119,221,0.15); }
  .s-input-error { border-color: rgba(226,75,74,0.6); color: #F0EFF8; }
  .s-error-msg { font-size: 10px; color: #E24B4A; font-family: var(--font); }
  .s-select { display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; border-radius: 7px; background: #0E0E12; border: 1px solid rgba(255,255,255,0.12); font-family: var(--font); font-size: 12px; color: #4A4868; }
  .s-chevron { width: 12px; height: 12px; border-right: 1.5px solid #4A4868; border-bottom: 1.5px solid #4A4868; transform: rotate(45deg) translateY(-3px); display: inline-block; }

  .s-tag-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .s-tag { padding: 4px 10px; border-radius: 100px; font-size: 11px; font-weight: 500; font-family: var(--font); display: flex; align-items: center; gap: 5px; border: 1px solid; }
  .s-tag-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
  .s-tag-default { background: rgba(255,255,255,0.05); color: #8B89A8; border-color: rgba(255,255,255,0.1); }
  .s-tag-dot-default { background: #8B89A8; }
  .s-tag-success { background: rgba(29,158,117,0.15); color: #5DCAA5; border-color: rgba(29,158,117,0.3); }
  .s-tag-dot-success { background: #1D9E75; }
  .s-tag-warning { background: rgba(186,117,23,0.15); color: #F0C060; border-color: rgba(186,117,23,0.3); }
  .s-tag-dot-warning { background: #BA7517; }
  .s-tag-error { background: rgba(226,75,74,0.15); color: #F09595; border-color: rgba(226,75,74,0.3); }
  .s-tag-dot-error { background: #E24B4A; }

  .s-icon-row { display: flex; gap: 20px; align-items: center; flex-wrap: wrap; }
  .s-icon-item { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .s-icon-box { width: 40px; height: 40px; border-radius: 8px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); display: flex; align-items: center; justify-content: center; }
  .s-icon-box svg { width: 20px; height: 20px; stroke: #8B89A8; fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
  .s-icon-name { font-size: 9px; color: #4A4868; font-family: var(--mono); }

  .s-thumb-row { display: flex; gap: 12px; align-items: flex-end; flex-wrap: wrap; }
  .s-thumb { border-radius: 8px; background: #0E0E12; border: 1px solid rgba(255,255,255,0.08); display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 6px; }
  .s-thumb-label { font-size: 9px; color: #4A4868; font-family: var(--mono); }
  .s-thumb svg { width: 20px; height: 20px; stroke: #2E2E3E; fill: none; stroke-width: 1.5; }

  .s-card { background: #0E0E12; border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; overflow: hidden; width: 220px; }
  .s-card-img { width: 100%; height: 110px; background: #1A1A24; border-bottom: 1px solid rgba(255,255,255,0.06); display: flex; align-items: center; justify-content: center; }
  .s-card-img svg { width: 28px; height: 28px; stroke: #2E2E3E; fill: none; stroke-width: 1.5; }
  .s-card-body { padding: 14px; display: flex; flex-direction: column; gap: 8px; }
  .s-card-title { font-size: 14px; font-weight: 600; color: #F0EFF8; font-family: var(--font); }
  .s-card-desc { font-size: 11px; color: #8B89A8; font-family: var(--font); line-height: 1.5; }

  .s-form { background: #0E0E12; border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 20px; width: 240px; display: flex; flex-direction: column; gap: 12px; }
  .s-form-title { font-size: 16px; font-weight: 600; color: #F0EFF8; font-family: var(--font); }
  .s-form-sub { font-size: 11px; color: #8B89A8; font-family: var(--font); }

  .s-list { background: #0E0E12; border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; overflow: hidden; width: 260px; }
  .s-list-item { display: flex; align-items: center; gap: 10px; padding: 11px 14px; border-bottom: 1px solid rgba(255,255,255,0.05); }
  .s-list-item:last-child { border-bottom: none; }
  .s-list-icon { width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .s-list-icon svg { width: 16px; height: 16px; stroke: #7F77DD; fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
  .s-list-text { font-size: 12px; color: #C8C7E0; font-family: var(--font); }

  .s-complex { background: #0E0E12; border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; overflow: hidden; width: 240px; }
  .s-complex-img { width: 100%; height: 100px; background: #1A1A24; position: relative; display: flex; align-items: center; justify-content: center; }
  .s-complex-tag { position: absolute; top: 8px; left: 8px; padding: 3px 8px; border-radius: 100px; background: rgba(127,119,221,0.25); color: #AFA9EC; font-size: 10px; font-weight: 500; font-family: var(--font); border: 1px solid rgba(127,119,221,0.4); }
  .s-complex-body { padding: 14px; display: flex; flex-direction: column; gap: 8px; }
  .s-toggle-row { display: flex; align-items: center; justify-content: space-between; }
  .s-toggle-label { font-size: 10px; color: #4A4868; font-family: var(--mono); }
  .s-toggle { width: 28px; height: 16px; border-radius: 8px; background: rgba(127,119,221,0.3); position: relative; border: 1px solid rgba(127,119,221,0.4); }
  .s-toggle.on { background: #7F77DD; }

<script>
const STORAGE_KEY = 'figma-induction-v2';

// === AUTH ===
const USERS = {
  adithyan: { password: 'Adithyan@4monks', displayName: 'Adithyan' },
  tom:      { password: 'tom@4monks',      displayName: 'Tom' }
};
const SESSION_KEY = 'figma-induction-session';

let currentUser = null;

function getStorageKey(username) {
  return STORAGE_KEY + '-' + username;
}

function attemptLogin() {
  const username = document.getElementById('login-username').value.trim().toLowerCase();
  const password = document.getElementById('login-password').value;
  const errorEl = document.getElementById('login-error');

  if (!USERS[username] || USERS[username].password !== password) {
    errorEl.textContent = 'Incorrect username or password. Please try again.';
    document.getElementById('login-password').value = '';
    document.getElementById('login-password').focus();
    return;
  }

  errorEl.textContent = '';
  currentUser = username;
  sessionStorage.setItem(SESSION_KEY, username);
  bootApp();
}

function logout() {
  sessionStorage.removeItem(SESSION_KEY);
  currentUser = null;
  state = { current: -1, completed: [], stepsDone: {} };
  document.getElementById('login-username').value = '';
  document.getElementById('login-password').value = '';
  document.getElementById('login-error').textContent = '';
  document.getElementById('login-screen').classList.remove('hidden');
  document.getElementById('app').style.display = 'none';
}

// Allow Enter key to submit login
document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !document.getElementById('login-screen').classList.contains('hidden')) {
    attemptLogin();
  }
});

function bootApp() {
  const user = USERS[currentUser];
  document.getElementById('login-screen').classList.add('hidden');
  document.getElementById('app').style.display = 'flex';

  // Show user badge
  const initials = user.displayName.substring(0, 2).toUpperCase();
  document.getElementById('user-avatar').textContent = initials;
  document.getElementById('user-name-label').textContent = user.displayName;
  document.getElementById('user-badge').style.display = 'flex';

  // Load this user's progress
  loadState();
  renderSidebar();

  if (state.current === -1) {
    document.getElementById('content-area').innerHTML = renderWelcome();
    document.getElementById('tb-chapter').textContent = 'Programme';
    document.getElementById('tb-title').textContent = 'Figma Design Induction';
    document.getElementById('nav-pos').textContent = '— / 12';
    document.getElementById('prev-btn').disabled = true;
    document.getElementById('next-btn').disabled = true;
  } else {
    goTo(state.current);
  }
}

// === STATE ===
let state = { current: -1, completed: [], stepsDone: {} };

function loadState() {
  try {
    const key = getStorageKey(currentUser);
    const s = localStorage.getItem(key);
    if (s) state = JSON.parse(s);
    else state = { current: -1, completed: [], stepsDone: {} };
  } catch(e) { state = { current: -1, completed: [], stepsDone: {} }; }
}

function saveState() {
  localStorage.setItem(getStorageKey(currentUser), JSON.stringify(state));
}

function resetProgress() {
  if (!confirm('Reset all your progress? This cannot be undone.')) return;
  state = { current: -1, completed: [], stepsDone: {} };
  saveState();
  location.reload();
}

// === RENDER ===
function renderSidebar() {
  const list = document.getElementById('chapter-list');
  list.innerHTML = chapters.map(ch => {
    const done = state.completed.includes(ch.id);
    const active = state.current === ch.id;
    return `<button class="ch-btn ${active ? 'active' : ''} ${done ? 'done' : ''}" onclick="goTo(${ch.id})">
      <div class="ch-num">${done ? '✓' : ch.id + 1}</div>
      <div class="ch-name">${ch.title}</div>
      <div class="ch-time">${ch.time}</div>
    </button>`;
  }).join('');
  updateProgress();
}

function updateProgress() {
  const pct = Math.round((state.completed.length / chapters.length) * 100);
  document.getElementById('overall-bar').style.width = pct + '%';
  document.getElementById('pct-label').textContent = pct + '%';
}

function renderChapter(id) {
  const ch = chapters[id];
  const doneSteps = state.stepsDone[id] || [];
  const levelClass = { Beginner: 'beginner', Intermediate: 'intermediate', Advanced: 'advanced' }[ch.level];

  document.getElementById('tb-chapter').textContent = `Chapter ${id + 1} of ${chapters.length}`;
  document.getElementById('tb-title').textContent = ch.title;
  document.getElementById('tb-badges').innerHTML = `
    <span class="badge badge-time">⏱ ${ch.time}</span>
    <span class="badge badge-level-${levelClass}">${ch.level}</span>
  `;
  document.getElementById('nav-pos').textContent = `${id + 1} / ${chapters.length}`;
  document.getElementById('prev-btn').disabled = id === 0;
  document.getElementById('next-btn').disabled = id === chapters.length - 1;
  document.getElementById('next-btn').textContent = id === chapters.length - 1 ? 'Last chapter' : 'Next →';

  const completedChapter = state.completed.includes(id);
  const stepsHTML = ch.steps.map((step, i) => {
    const checked = doneSteps.includes(i);
    return `<li class="task-step">
      <div class="step-check ${checked ? 'checked' : ''}" onclick="toggleStep(${id}, ${i})"></div>
      <span class="step-text ${checked ? 'checked' : ''}">${step}</span>
    </li>`;
  }).join('');

  const allDone = ch.steps.length > 0 && doneSteps.length >= ch.steps.length;

  const sampleHTML = samples[id] ? `
    <div class="section">
      <div class="section-label">Sample preview</div>
      <div class="sample-card">
        <div class="sample-inner">${samples[id]}</div>
      </div>
    </div>` : '';

  return `
    <div class="figma-banner">
      <div class="figma-banner-icon"><svg viewBox="0 0 38 57" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M19 28.5a9.5 9.5 0 1 1 19 0 9.5 9.5 0 0 1-19 0z" fill="#1ABCFE"/><path d="M0 47.5A9.5 9.5 0 0 1 9.5 38H19v9.5a9.5 9.5 0 0 1-19 0z" fill="#0ACF83"/><path d="M19 0v19h9.5a9.5 9.5 0 0 0 0-19H19z" fill="#FF7262"/><path d="M0 9.5A9.5 9.5 0 0 0 9.5 19H19V0H9.5A9.5 9.5 0 0 0 0 9.5z" fill="#F24E1E"/><path d="M0 28.5A9.5 9.5 0 0 0 9.5 38H19V19H9.5A9.5 9.5 0 0 0 0 28.5z" fill="#A259FF"/></svg></div>
      <div class="figma-banner-text">Work directly in the shared Figma file — <strong>${ch.figmaPage}</strong></div>
      <div class="figma-banner-page">${ch.figmaPage.split(' — ')[0]}</div>
    </div>
    <div class="section">
      <div class="section-label">What you'll learn</div>
      ${ch.concepts.map(c => `<div class="concept-card"><div class="concept-title">${c.title}</div><div class="concept-desc">${c.desc}</div></div>`).join('')}
    </div>
    ${sampleHTML}
    <div class="section">
      <div class="section-label">Hands-on task</div>
      <div class="task-card">
        <div class="task-header"><div class="task-icon">✏️</div><div class="task-label-text">Task</div></div>
        <div class="task-title">${ch.taskTitle}</div>
        <ul class="task-steps">${stepsHTML}</ul>
      </div>
    </div>
    <div class="section">
      <div class="tip-card"><div class="tip-label">Pro tip</div><div class="tip-text">${ch.tip}</div></div>
    </div>
    <div class="complete-row">
      <button class="complete-btn ${completedChapter ? 'completed' : ''}" onclick="markComplete(${id})">
        ${completedChapter ? '✓ Chapter complete' : '✓ Mark chapter complete'}
      </button>
      ${!completedChapter ? `<span class="complete-hint">${allDone ? 'All steps checked — ready to mark complete!' : `${doneSteps.length}/${ch.steps.length} steps checked`}</span>` : ''}
    </div>
  `;
}

function renderWelcome() {
  const resumeChapter = state.completed.length > 0 ? Math.max(...state.completed) + 1 : 0;
  const nextChapter = chapters[Math.min(resumeChapter, chapters.length - 1)];
  const pct = Math.round((state.completed.length / chapters.length) * 100);
  return `
    <div class="welcome">
      <div class="welcome-emoji">✦</div>
      <div class="welcome-title">${state.completed.length > 0 ? 'Welcome back' : 'Welcome to Figma Induction'}</div>
      <div class="welcome-sub">
        ${state.completed.length > 0
          ? `You've completed ${state.completed.length} of ${chapters.length} chapters. Keep going — you're ${pct}% through the programme.`
          : 'A step-by-step programme to take you from Figma basics to a complete, production-ready design system. Each chapter maps to a page in your shared Figma file.'}
      </div>
      <div class="welcome-stats">
        <div class="stat"><div class="stat-num">12</div><div class="stat-label">chapters</div></div>
        <div class="stat"><div class="stat-num">~9h</div><div class="stat-label">total time</div></div>
        <div class="stat"><div class="stat-num">${state.completed.length}</div><div class="stat-label">completed</div></div>
      </div>
      <button class="start-btn" onclick="goTo(${Math.min(resumeChapter, chapters.length - 1)})">
        ${state.completed.length > 0 ? `Continue: ${nextChapter.title} →` : 'Start with Colors →'}
      </button>
    </div>
  `;
}

function goTo(id) {
  state.current = id;
  saveState();
  document.getElementById('content-area').innerHTML = renderChapter(id);
  document.getElementById('content-area').scrollTop = 0;
  renderSidebar();
}

function navigate(dir) {
  const next = state.current + dir;
  if (next >= 0 && next < chapters.length) goTo(next);
}

function toggleStep(chapterId, stepIdx) {
  if (!state.stepsDone[chapterId]) state.stepsDone[chapterId] = [];
  const arr = state.stepsDone[chapterId];
  const idx = arr.indexOf(stepIdx);
  if (idx === -1) arr.push(stepIdx); else arr.splice(idx, 1);
  saveState();
  goTo(chapterId);
}

function markComplete(id) {
  if (!state.completed.includes(id)) state.completed.push(id);
  saveState();
  if (id < chapters.length - 1) {
    goTo(id + 1);
  } else {
    goTo(id);
    setTimeout(() => {
      document.getElementById('content-area').scrollTop = 9999;
    }, 100);
  }
}

// === INIT ===
// Check for existing session
const savedSession = sessionStorage.getItem(SESSION_KEY);
if (savedSession && USERS[savedSession]) {
  currentUser = savedSession;
  bootApp();
} else {
  // Show login, focus username field
  document.getElementById('login-username').focus();
}
</script>
